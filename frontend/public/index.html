<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HospitalityOS — Hotel Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#FF6B35', light: '#fff3ef', dark: '#e55a26' },
            secondary: '#1E1E1E',
            surface: '#F8F9FA',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['Syne', 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            hover: '0 4px 12px rgba(0,0,0,0.1)',
            glow: '0 0 20px rgba(255,107,53,0.2)',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #F8F9FA; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .sidebar-link { transition: all 0.15s ease; }
    .sidebar-link:hover { transform: translateX(2px); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .btn-primary { transition: all 0.15s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,53,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .table-tile { transition: all 0.2s; cursor: pointer; }
    .table-tile:hover { transform: scale(1.03); }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(255,107,53,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/static/js/bundle.js"></script>
</body>
</html>
